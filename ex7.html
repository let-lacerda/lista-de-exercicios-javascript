<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 7</title>
</head>
<body>
    <script>
    
    // Receba uma nota de 0 a 10. 
    // >= 7: "Aprovado". 
    // >= 5 e < 7: "Recuperação".
    // < 5: "Reprovado".

    let nota = prompt("Digite a nota do(a) aluno(a):");

    nota = parseFloat(nota);

      if (nota >= 7) {
        alert("Aprovado");
    } else if (nota >= 5) {
        alert("Recuperação");
    } else {
        alert("Reprovado");
    }

    </script>
</body>
</html>
