<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 7 - Versão 2</title>
</head>
<body>
    <input type="number" id="nota" placeholder="Digite a nota (0-10)" step="0.1">
    <button onclick="classificar()">Verificar</button>
    <p id="resultado"></p>

    <script>
        function classificar() {
            let nota = parseFloat(document.getElementById('nota').value);
            let msg = nota >= 7 ? "Aprovado" : (nota >= 5 ? "Recuperação" : "Reprovado");
            document.getElementById('resultado').innerHTML = msg;
        }
    </script>
</body>
</html>
