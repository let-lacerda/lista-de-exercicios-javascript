<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 19</title>
</head>
<body>
    <script>
    
    // Dado o array [2, 5, 8, 11, 14], use filter para selecionar apenas os números maiores que 5 e depois map para multiplicá-los por 2. 
    // Mostre o resultado final.

    const numeros = [2, 5, 8, 11, 14];

    const resultado = numeros
    .filter(numero => numero > 5)
    .map(numero => numero * 2);

    console.log(resultado);
    
    </script>
</body>
</html>
