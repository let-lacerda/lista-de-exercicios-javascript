    <script>
    
    // Crie um objeto pessoa com nome, idade e cidade.
    // Use for...in para listar suas propriedades e valores.

    const pessoa = {
    nome: "Letícia Lacerda",
    idade: 22,
    cidade: "Brasília"
};

    for (let propriedade in pessoa) {
    console.log(`${propriedade}: ${pessoa[propriedade]}`);
}
    </script>
