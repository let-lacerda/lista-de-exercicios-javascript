<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 8 - Versão 2</title>
</head>
<body>
    <input type="number" id="numero" placeholder="Digite um número">
    <button onclick="verificar()">Verificar</button>
    <p id="resultado"></p>

    <script>
        function verificar() {
            let num = parseFloat(document.getElementById('numero').value);
            let msg = num > 0 ? "Positivo" : (num < 0 ? "Negativo" : "Zero");
            document.getElementById('resultado').innerHTML = msg;
        }
    </script>
</body>
</html>
