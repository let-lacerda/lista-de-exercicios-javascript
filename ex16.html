<body>
    <script>
    
    // Dado o array [1, 2, 3, 4, 5], use map para criar um novo array com cada número dobrado.

    let numeros = [1, 2, 3, 4, 5];

    numerosDobrados = numeros.map(numero => numero * 2);

    console.log(numerosDobrados);

    </script>
